<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Home</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="CSS\main.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="container-fluid d-flex">
        <div id="homelogo" class="col col-lg-1 col-md-1 ps-2">
          <img
            id="logo"
            src="LOGO\FullLogo_Transparent_NoBuffer.png"
            alt="logo"
            height="55"
            width="55"
          />
        </div>
        <div id="searchinput">
          <div class="input-group rounded" style="width: 50vw">
            <input
              type="search"
              class="form-control rounded"
              placeholder="Title, artist or album name ..."
              aria-label="Search"
              aria-describedby="search-addon"
            />
            <span
              class="input-group-text bg-dark"
              id="search-addon"
              type="submit"
            >
              <i class="mb-1 gg-search" style="color: #fbfbfb"></i>
            </span>
          </div>
        </div>
        <div
          class="col col-lg-9 col-md-8 col-sm-10 text-center d-flex justify-content-center"
        >
          <a id="home" class="px-4" href="index.html">
            <h5 id="homebutton" class="text-white">Home</h5>
          </a>
          <a id="explore" class="px-4" href="">
            <h5>Explore</h5>
          </a>
          <a id="library" class="px-4" href="">
            <h5>Library</h5>
          </a>
          <a
            id="searchbutton"
            href="#"
            class="px-4 d-flex align-items-center justify-content-center"
          >
            <i id="searchbuttonicon" class="mb-1 gg-search fw-small"></i>
            <h5 id="searchbox" class="ps-3">Search</h5>
          </a>
        </div>
        <div class="col col-lg-2 col-md-3 d-flex justify-content-end">
          <a href="login.html">
            <i id="usericon" class="gg-profile mx-3"></i>
          </a>
          <a href="userprofile.html">
            <span id="username" class="me-1">Gueram</span>
          </a>
        </div>
      </div>
    </nav>
    <section id="main" class="my-5">
      <div class="container my-5 d-flex align-items-center">
        <img id="profilephoto" src="https://s.france24.com/media/display/09184122-0fd1-11e9-b52f-005056a964fe/w:1280/p:4x3/57fe71b1506350325db2a9bf6aa51422.jpg" alt="userphoto" >
        <h1 class="px-4">Geram Hovhannisyan</h1>
      </div>
      <div class="container text-start my-5">
        <h4 class="my-5 py-5">My mix</h4>
      </div>
      <div class="container d-flex">
        <div class="col col-lg-6 col-md-6 col-sm-12">
          Title
          <div class="flex-column m-4">
            <i class="gg-play-button-o"></i>
            <i class="gg-play-button-o"></i>
            <i class="gg-play-button-o"></i>
            <i class="gg-play-button-o"></i>
            <i class="gg-play-button-o"></i>
          </div>
        </div>
        <div class="col col-lg-6 col-md-6 col-sm-0">
          Album
          <div class="flex-column">
            <img src="" alt="" width="30" height="30">
            <img src="" alt="" width="30" height="30">
            <img src="" alt="" width="30" height="30">
            <img src="" alt="" width="30" height="30">
            <img src="" alt="" width="30" height="30">
          </div>
        </div>
      </div>
    </section>
      <button class="btn btn-light" id="theme">Switch theme</button>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN"
      crossorigin="anonymous"
    ></script>
    <script src="JS/lightmode.js"></script>
    <script src="JS\searchbar.js"></script>
  </body>
</html>
