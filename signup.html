<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Log In</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="CSS\main.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="container-fluid d-flex">
        <div id="homelogo" class="col col-lg-1 col-md-1 ps-2">
          <a href="index.html"><img
            id="logo"
            src="LOGO\FullLogo_Transparent_NoBuffer.png"
            alt="logo"
            height="55"
            width="55"
          /></a>
          
        </div>
        <div id="searchinput">
          <div class="input-group rounded" style="width: 50vw">
            <input
              type="search"
              class="form-control rounded"
              placeholder="Title, artist or album name ..."
              aria-label="Search"
              aria-describedby="search-addon"
            />
            <span
              class="input-group-text bg-dark"
              id="search-addon"
              type="submit"
            >
              <i class="mb-1 gg-search" style="color: #fbfbfb"></i>
            </span>
          </div>
        </div>
        <div
          class="col col-lg-9 col-md-8 col-sm-10 text-center d-flex justify-content-center"
        >
          <a id="home" class="px-4" href="index.html">
            <h5 id="homebutton" class="text-white">Home</h5>
          </a>
          <a id="explore" class="px-4" href="explore.html">
            <h5>Explore</h5>
          </a>
          <a id="library" class="px-4" href="library.html">
            <h5>Library</h5>
          </a>
          <a
            id="searchbutton"
            href="#"
            class="px-4 d-flex align-items-center justify-content-center"
          >
            <i id="searchbuttonicon" class="mb-1 gg-search fw-small"></i>
            <h5 id="searchbox" class="ps-3">Search</h5>
          </a>
        </div>
        <div class="col col-lg-2 col-md-3 d-flex justify-content-end">
          <div class="dropdown pe-3">
            <a class="dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            </a>
            <ul class="dropdown-menu">
              <a id="theme" class="dropdown-item" href="#">Switch theme</a>
            </ul>
          </div>
          <a href="login.html">
            <i id="usericon" class="gg-profile ms-1 me-5"></i>
          </a>
          <a href="userprofile.html">
            <span id="username" class="me-1">Gueram</span>
          </a>
        </div>
      </div>
    </nav>
    <section class="vh-75 gradient-custom">
      <div id="loginbox" class="container py-1 h-100">
        <div class="row d-flex justify-content-center align-items-center h-100">
          <div class="col-12 col-md-8 col-lg-6 col-xl-5">
            <div class="card bg-dark text-white" style="border-radius: 1rem">
              <div class="card-body px-5 text-center">
                <div class="mb-md-5 mt-md-4 pb-1">
                  <img
                    src="LOGO\FullLogo_Transparent_NoBuffer.png"
                    alt="mainlogo"
                    width="90"
                    height="105"
                  />
                  <h2 class="text-light my-4">SignUp</h2>

                  <div class="form-outline form-white mb-4">
                    <input
                      type="username"
                      id="typeUsername"
                      class="form-control form-control-lg"
                      required
                    />
                    <label class="form-label" for="typeUsername"
                      >Username</label
                    >
                  </div>

                  <div class="form-outline form-white mb-4">
                    <input
                      type="email"
                      id="typeEmail"
                      class="form-control form-control-lg"
                      required
                    />
                    <label class="form-label" for="typeEmail">E-mail</label>
                  </div>

                  <div class="form-outline form-white mb-4">
                    <input
                      type="password"
                      id="typePassword"
                      class="form-control form-control-lg"
                      required
                    />
                    <label class="form-label" for="typePassword"
                      >Password</label
                    >
                  </div>

                  <button
                    class="btn btn-outline-light btn-lg px-5 mb-5"
                    type="submit"
                  >
                    Signup
                  </button>
                <div>
                  <p class="pb-0">Signup with Your social media:</p>
                </div>
                <div class="d-flex align-items-center justify-content-center">
                  <a href="">
                    <i class="gg-google m-2"></i>
                  </a>
                  <a href="">
                    <i class="gg-facebook m-2"></i>
                  </a>
                  <a href="">
                    <i class="gg-microsoft m-2"></i>
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN"
      crossorigin="anonymous"
    ></script>
    <script src="JS/lightmode.js"></script>
  </body>
</html>
