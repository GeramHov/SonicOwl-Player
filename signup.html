<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Log In</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="CSS\main.css" />
  </head>
  <body>
    <nav class="navbar p-1 h-25">
      <div class="container-fluid d-flex">
        <div id="homelogo" class="col col-lg-3 col-md-3 p-3">
          <a href="index.html">
            <img
              id="backarrow"
              src="ICON\left-arrow.png"
              alt="back"
              height="35"
              width="35"
            />
          </a>
          &nbsp;&nbsp; Home
        </div>
      </div>
    </nav>
    <section class="vh-75 gradient-custom">
      <div id="loginbox" class="container py-1 h-100">
        <div class="row d-flex justify-content-center align-items-center h-100">
          <div class="col-12 col-md-8 col-lg-6 col-xl-5">
            <div class="card bg-dark text-white" style="border-radius: 1rem">
              <div class="card-body px-5 text-center">
                <div class="mb-md-5 mt-md-4 pb-1">
                  <img
                    src="LOGO\FullLogo_Transparent_NoBuffer.png"
                    alt="mainlogo"
                    width="90"
                    height="105"
                  />
                  <h2 class="text-light my-4">SignUp</h2>

                  <div class="form-outline form-white mb-4">
                    <input
                      type="username"
                      id="typeUsername"
                      class="form-control form-control-lg"
                      required
                    />
                    <label class="form-label" for="typeUsername"
                      >Username</label
                    >
                  </div>

                  <div class="form-outline form-white mb-4">
                    <input
                      type="email"
                      id="typeEmail"
                      class="form-control form-control-lg"
                      required
                    />
                    <label class="form-label" for="typeEmail">E-mail</label>
                  </div>

                  <div class="form-outline form-white mb-4">
                    <input
                      type="password"
                      id="typePassword"
                      class="form-control form-control-lg"
                      required
                    />
                    <label class="form-label" for="typePassword"
                      >Password</label
                    >
                  </div>

                  <button
                    class="btn btn-outline-light btn-lg px-5 mb-5"
                    type="submit"
                  >
                    Signup
                  </button>
                <div>
                  <p class="pb-0">Signup with Your social media:</p>
                </div>
                <div class="d-flex align-items-center justify-content-center">
                  <a href="">
                    <i class="gg-google m-2"></i>
                  </a>
                  <a href="">
                    <i class="gg-facebook m-2"></i>
                  </a>
                  <a href="">
                    <i class="gg-microsoft m-2"></i>
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN"
      crossorigin="anonymous"
    ></script>
    <script src="JS\searchbar.js"></script>
  </body>
</html>
